<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarot Admin — Bảng Điều Khiển Huyền Bí</title>
  <link rel="icon" type="image/png" href="../cards/icon/tarot_favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Philosopher:wght@400;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #04000e;
      --surface: #080014;
      --card: rgba(12, 0, 30, 0.85);
      --border: rgba(155, 48, 255, 0.2);
      --purple: #9b30ff;
      --gold: #c9a84c;
      --gold-pale: rgba(255, 230, 130, 0.9);
      --text: #e8e0ff;
      --muted: rgba(232, 224, 255, 0.45);
      --danger: #ff6060;
      --success: #60ffa0;
      --warning: #ffb860;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      color-scheme: dark;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Philosopher', serif;
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Nebula & Vignette Backgrounds ──────────────────── */
    .bg-nebula {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 15% 30%, rgba(107, 0, 204, 0.15), transparent 45%),
        radial-gradient(circle at 85% 70%, rgba(155, 48, 255, 0.1), transparent 50%),
        radial-gradient(circle at 50% 10%, rgba(201, 168, 76, 0.08), transparent 35%);
      mix-blend-mode: screen;
      animation: drift 25s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from {
        transform: scale(1) translate(0, 0);
      }

      to {
        transform: scale(1.05) translate(2%, 2%);
      }
    }

    .bg-vignette {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 30%, rgba(4, 0, 14, 0.75) 100%);
    }

    .bg-sigil-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 120vh;
      height: 120vh;
      transform: translate(-50%, -50%);
      z-index: -2;
      pointer-events: none;
      opacity: 0.15;
      animation: spinSigil 180s linear infinite;
    }

    @keyframes spinSigil {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }

      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }

    .bg-sigil-svg {
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0.8;
    }


    /* Form elements baseline */
    option {
      background: var(--surface);
      color: var(--text);
      font-family: 'Philosopher', serif;
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    input[type="date"]::-webkit-calendar-picker-indicator:hover {
      opacity: 1;
    }

    /* ── Stars / Particles Canvas ──────────────────── */
    #particleCanvas,
    #lightningCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 1;
    }

    /* ── Floating Cards ───────────────────────────── */
    .floating-cards-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .float-card {
      position: absolute;
      top: 0;
      left: 0;
      background: none !important;
      border-radius: 7px;
      box-shadow: 0 4px 24px rgba(107, 0, 204, 0.35);
      pointer-events: none;
      will-change: transform, opacity;
      z-index: -1;
    }

    #loginScreen {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    @keyframes loginPulse {

      0%,
      100% {
        box-shadow: 0 0 40px rgba(107, 0, 204, 0.25), 0 0 80px rgba(107, 0, 204, 0.1);
      }

      50% {
        box-shadow: 0 0 60px rgba(155, 48, 255, 0.45), 0 0 120px rgba(107, 0, 204, 0.2);
      }
    }

    .login-box {
      background: linear-gradient(160deg, rgba(16, 0, 40, 0.95), rgba(8, 0, 22, 0.98));
      border: 1px solid rgba(155, 48, 255, 0.35);
      border-radius: 24px;
      padding: 52px 44px;
      width: min(440px, 92vw);
      text-align: center;
      animation: loginPulse 4s ease-in-out infinite;
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .login-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(155, 48, 255, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-icon {
      font-size: 2.8rem;
      margin-bottom: 16px;
      animation: loginIconFloat 3s ease-in-out infinite alternate;
    }

    @keyframes loginIconFloat {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(-8px);
        filter: drop-shadow(0 0 16px rgba(201, 168, 76, 0.6));
      }
    }

    /* ── Sigil Login Icon ───────────────────────── */
    .sigil-wrap {
      width: 130px;
      height: 130px;
      margin: 0 auto 16px;
      position: relative;
    }

    .sigil-svg {
      width: 100%;
      height: 100%;
      display: block;
      animation: spinSigilIcon 24s linear infinite;
    }

    @keyframes spinSigilIcon {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .sigil-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(155, 48, 255, 0.3) 0%, transparent 60%);
      pointer-events: none;
      filter: blur(10px);
      animation: pulseSigil 3s ease-in-out infinite alternate;
    }

    @keyframes pulseSigil {
      from {
        transform: translate(-50%, -50%) scale(0.9);
        opacity: 0.6;
      }

      to {
        transform: translate(-50%, -50%) scale(1.1);
        opacity: 1;
      }
    }

    .login-title {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      color: var(--gold);
      margin-bottom: 6px;
      letter-spacing: 0.08em;
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
    }

    .login-sub {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .login-input {
      width: 100%;
      background: rgba(155, 48, 255, 0.07);
      border: 1px solid rgba(155, 48, 255, 0.3);
      border-radius: 12px;
      padding: 14px 18px;
      color: #fff;
      font-family: 'Philosopher', serif;
      font-size: 1rem;
      outline: none;
      margin-bottom: 18px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .login-input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 20px rgba(155, 48, 255, 0.25);
    }

    .login-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, rgba(107, 0, 204, 0.85), rgba(155, 48, 255, 0.65));
      border: 1px solid rgba(200, 121, 255, 0.5);
      border-radius: 12px;
      color: var(--gold-pale);
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.3s var(--ease-out);
    }

    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(155, 48, 255, 0.5);
      border-color: var(--purple);
    }

    .login-error {
      color: var(--danger);
      font-size: 0.82rem;
      margin-top: 14px;
      font-family: 'EB Garamond', serif;
      font-style: italic;
    }

    /* ── App Layout ───────────────────────────── */
    #app {
      display: none;
      position: relative;
      z-index: 10;
    }

    .admin-layout {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: linear-gradient(180deg, rgba(16, 0, 40, 0.35), rgba(8, 0, 20, 0.6));
      border-right: 1px solid rgba(155, 48, 255, 0.25);
      box-shadow: 4px 0 30px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      padding: 32px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      backdrop-filter: blur(24px);
      z-index: 20;
    }

    .sidebar-logo {
      padding: 0 28px 32px;
      border-bottom: 1px solid rgba(155, 48, 255, 0.15);
      margin-bottom: 24px;
      text-align: center;
    }

    .sidebar-logo-icon {
      font-size: 1.8rem;
      margin-bottom: 8px;
      animation: loginIconFloat 4s ease-in-out infinite alternate;
      display: block;
    }

    .sidebar-logo-title {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-shadow: 0 0 12px rgba(201, 168, 76, 0.3);
    }

    .sidebar-logo-sub {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 3px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 28px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.3s var(--ease-out);
      border-left: 4px solid transparent;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      position: relative;
      margin-bottom: 4px;
    }

    .nav-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(155, 48, 255, 0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .nav-item:hover {
      color: var(--text);
      transform: translateX(4px);
    }

    .nav-item:hover::before {
      opacity: 1;
    }

    .nav-item.active {
      color: var(--gold-pale);
      border-left-color: var(--gold);
      background: linear-gradient(90deg, rgba(201, 168, 76, 0.1), transparent);
      text-shadow: 0 0 10px rgba(201, 168, 76, 0.4);
    }

    .nav-item.active::before {
      opacity: 0;
    }

    .nav-icon {
      font-size: 1.05rem;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 18px 22px;
      border-top: 1px solid var(--border);
    }

    .logout-btn {
      width: 100%;
      padding: 9px;
      background: rgba(255, 96, 96, 0.08);
      border: 1px solid rgba(255, 96, 96, 0.25);
      border-radius: 10px;
      color: var(--danger);
      cursor: pointer;
      font-family: 'Philosopher', serif;
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      background: rgba(255, 96, 96, 0.18);
      box-shadow: 0 4px 16px rgba(255, 96, 96, 0.2);
    }

    /* Main */
    .main {
      flex: 1;
      overflow-x: hidden;
    }

    .topbar {
      background: linear-gradient(90deg, rgba(10, 0, 28, 0.97), rgba(8, 0, 20, 0.95));
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(16px);
    }

    .topbar-title {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 1rem;
      flex: 1;
      letter-spacing: 0.1em;
      text-shadow: 0 0 12px rgba(201, 168, 76, 0.25);
    }

    .search-input {
      background: rgba(155, 48, 255, 0.07);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 16px;
      color: #fff;
      font-family: 'Philosopher', serif;
      outline: none;
      width: 260px;
      font-size: 0.85rem;
      transition: border-color 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    input.search-input {
      cursor: text;
    }

    input[type="date"].search-input {
      cursor: pointer;
    }

    .search-input:focus {
      border-color: rgba(155, 48, 255, 0.6);
      box-shadow: 0 0 16px rgba(155, 48, 255, 0.2);
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .content {
      padding: 24px 28px;
    }

    /* Stats cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    @keyframes cardGlow {

      0%,
      100% {
        box-shadow: 0 4px 20px rgba(107, 0, 204, 0.2);
      }

      50% {
        box-shadow: 0 8px 30px rgba(155, 48, 255, 0.35);
      }
    }

    .stat-card {
      background: linear-gradient(145deg, rgba(16, 0, 40, 0.9), rgba(10, 0, 24, 0.95));
      border: 1px solid rgba(155, 48, 255, 0.25);
      border-radius: 16px;
      padding: 22px;
      transition: transform 0.3s var(--ease-out), border-color 0.3s;
      position: relative;
      overflow: hidden;
      animation: cardGlow 4s ease-in-out infinite;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(155, 48, 255, 0.5), transparent);
    }

    .stat-card:hover {
      transform: translateY(-5px);
      border-color: rgba(155, 48, 255, 0.5);
    }

    .stat-label {
      font-family: 'EB Garamond', serif;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--purple);
      text-shadow: 0 0 16px rgba(155, 48, 255, 0.4);
    }

    .stat-sub {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 6px;
      font-family: 'EB Garamond', serif;
      font-style: italic;
    }

    /* Table */
    .table-wrap {
      background: linear-gradient(160deg, rgba(14, 0, 36, 0.9), rgba(8, 0, 20, 0.95));
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    .table-wrap::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.35), transparent);
    }

    .table-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .table-title {
      font-family: 'Cinzel', serif;
      font-size: 0.88rem;
      color: var(--gold-pale);
      letter-spacing: 0.08em;
      text-shadow: 0 0 10px rgba(201, 168, 76, 0.2);
    }

    .badge {
      background: rgba(155, 48, 255, 0.18);
      border: 1px solid rgba(155, 48, 255, 0.3);
      color: var(--purple);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: rgba(155, 48, 255, 0.06);
      color: var(--muted);
      font-family: 'Philosopher', serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 11px 18px;
      text-align: left;
    }

    td {
      padding: 13px 18px;
      border-bottom: 1px solid rgba(155, 48, 255, 0.07);
      font-size: 0.83rem;
      vertical-align: middle;
      transition: background 0.2s;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(155, 48, 255, 0.05);
    }

    .td-muted {
      color: var(--muted);
    }

    .td-wrap {
      max-width: 280px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .theme-chip {
      display: inline-block;
      background: rgba(201, 168, 76, 0.12);
      border: 1px solid rgba(201, 168, 76, 0.3);
      color: var(--gold);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.72rem;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }

    .plan-chip {
      display: inline-block;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.72rem;
      white-space: nowrap;
      background: rgba(96, 255, 160, 0.1);
      border: 1px solid rgba(96, 255, 160, 0.3);
      color: var(--success);
    }

    .plan-chip.free {
      background: rgba(255, 255, 255, 0.04);
      border-color: var(--border);
      color: var(--muted);
    }

    .plan-select {
      background: rgba(155, 48, 255, 0.06);
      border: 1px solid rgba(155, 48, 255, 0.3);
      color: var(--gold-pale);
      border-radius: 8px;
      padding: 3px 8px;
      font-family: 'Philosopher', serif;
      font-size: 0.75rem;
      outline: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .plan-select:focus {
      border-color: var(--gold);
    }

    .status-chip {
      display: inline-block;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.72rem;
      white-space: nowrap;
      text-transform: capitalize;
    }

    .status-chip.active {
      background: rgba(96, 255, 160, 0.1);
      border: 1px solid rgba(96, 255, 160, 0.3);
      color: var(--success);
    }

    .status-chip.warned {
      background: rgba(255, 184, 96, 0.1);
      border: 1px solid rgba(255, 184, 96, 0.3);
      color: var(--warning);
    }

    .status-chip.banned {
      background: rgba(255, 96, 96, 0.1);
      border: 1px solid rgba(255, 96, 96, 0.3);
      color: var(--danger);
    }

    /* ── Action Dropdown & Buttons ──────────────────── */
    .action-btn {
      background: rgba(155, 48, 255, 0.12);
      border: 1px solid rgba(155, 48, 255, 0.3);
      color: rgba(200, 150, 255, 0.9);
      border-radius: 8px;
      padding: 5px 14px;
      cursor: pointer;
      font-family: 'Philosopher', serif;
      font-size: 0.78rem;
      transition: all 0.25s var(--ease-out);
      letter-spacing: 0.04em;
    }

    .action-btn:hover {
      background: rgba(155, 48, 255, 0.28);
      border-color: var(--purple);
      box-shadow: 0 4px 14px rgba(155, 48, 255, 0.3);
      transform: translateY(-1px);
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      top: 110%;
      background: rgba(12, 0, 30, 0.95);
      min-width: 140px;
      border: 1px solid rgba(155, 48, 255, 0.4);
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(4, 0, 14, 0.8);
      z-index: 50;
      backdrop-filter: blur(10px);
      padding: 6px 0;
    }

    .dropdown-content.show {
      display: block;
      animation: fadeInDown 0.2s ease-out;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .dropdown-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text);
      transition: background 0.2s;
      text-align: left;
      border: none;
      background: none;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Philosopher', serif;
    }

    .dropdown-item:hover {
      background: rgba(155, 48, 255, 0.15);
    }

    .dropdown-item.text-warn {
      color: var(--warning);
    }

    .dropdown-item.text-ban {
      color: var(--danger);
    }

    .dropdown-item.text-success {
      color: var(--success);
    }

    /* Custom Input Dropdowns */
    .filter-dropdown {
      position: relative;
    }

    .filter-btn {
      background: rgba(15, 0, 30, 0.6);
      border: 1px solid rgba(155, 48, 255, 0.3);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 18px;
      cursor: pointer;
      font-family: 'Philosopher', serif;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: all 0.3s;
      min-width: 180px;
      backdrop-filter: blur(8px);
    }

    .filter-btn:hover {
      border-color: var(--gold);
      box-shadow: 0 0 16px rgba(201, 168, 76, 0.15);
    }

    .filter-menu {
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 8px;
      background: rgba(12, 0, 30, 0.95);
      border: 1px solid rgba(155, 48, 255, 0.4);
      border-radius: 12px;
      min-width: 100%;
      padding: 8px 0;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
      z-index: 60;
      backdrop-filter: blur(12px);
      display: none;
      max-height: 300px;
      overflow-y: auto;
    }

    .filter-menu.show {
      display: block;
      animation: fadeInDown 0.2s ease-out;
    }

    .filter-menu::-webkit-scrollbar {
      width: 4px;
    }

    .filter-menu::-webkit-scrollbar-track {
      background: transparent;
    }

    .filter-menu::-webkit-scrollbar-thumb {
      background: rgba(155, 48, 255, 0.4);
      border-radius: 4px;
    }

    .filter-item {
      padding: 10px 18px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'EB Garamond', serif;
      font-size: 0.95rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-item:hover {
      background: rgba(155, 48, 255, 0.15);
      color: var(--gold-pale);
    }

    .filter-item.active {
      background: rgba(201, 168, 76, 0.1);
      color: var(--gold);
      border-left: 2px solid var(--gold);
    }

    /* Plan Dropdown within Table */
    .plan-custom-select {
      position: relative;
      display: inline-block;
    }

    .plan-btn {
      background: rgba(155, 48, 255, 0.06);
      border: 1px solid rgba(155, 48, 255, 0.3);
      color: var(--text);
      border-radius: 8px;
      padding: 5px 12px;
      font-family: 'Philosopher', serif;
      font-size: 0.75rem;
      cursor: pointer;
      min-width: 120px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }

    .plan-btn:hover {
      border-color: var(--gold);
    }

    .plan-btn[data-val="guide"] {
      color: var(--gold);
    }

    .plan-btn[data-val="master"] {
      color: #ff6060;
    }

    .plan-menu {
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 4px;
      background: rgba(12, 0, 30, 0.98);
      border: 1px solid rgba(155, 48, 255, 0.4);
      border-radius: 8px;
      padding: 4px 0;
      z-index: 60;
      display: none;
      min-width: 100%;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.8);
    }

    .plan-menu.show {
      display: block;
      animation: fadeInDown 0.2s;
    }

    .plan-item {
      padding: 8px 12px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Philosopher', serif;
      white-space: nowrap;
    }

    .plan-item:hover {
      background: rgba(155, 48, 255, 0.2);
      color: #fff;
    }

    /* Pagination */
    .pagination {
      display: flex;
      gap: 6px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      justify-content: flex-end;
    }

    .page-btn {
      background: rgba(155, 48, 255, 0.08);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 13px;
      cursor: pointer;
      font-family: 'Philosopher', serif;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .page-btn:hover,
    .page-btn.active {
      background: rgba(155, 48, 255, 0.28);
      color: var(--text);
      border-color: var(--purple);
      box-shadow: 0 0 10px rgba(155, 48, 255, 0.3);
    }

    .page-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    /* Theme bars */
    .theme-bars {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 18px 22px;
    }

    .theme-bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .theme-bar-label {
      width: 190px;
      font-size: 0.8rem;
      color: var(--muted);
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'EB Garamond', serif;
    }

    .theme-bar-track {
      flex: 1;
      height: 7px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      overflow: hidden;
    }

    .theme-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #9b30ff, rgba(201, 168, 76, 0.7));
      border-radius: 4px;
      transition: width 0.8s var(--ease-out);
    }

    .theme-bar-cnt {
      font-size: 0.75rem;
      color: var(--gold);
      width: 32px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Detail modal */
    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 0, 14, 0.88);
      backdrop-filter: blur(12px);
      z-index: 100;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
      transition: opacity 0.3s;
    }

    .detail-overlay.open {
      display: flex;
    }

    @keyframes detailIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    /* Reading Detail Modal (Fullscreen Product Clone) */
    .detail-box {
      background: linear-gradient(160deg, rgba(8, 0, 20, 0.98), rgba(4, 0, 10, 0.99));
      border: 1px solid rgba(155, 48, 255, 0.4);
      border-radius: 20px;
      width: 100%;
      max-width: 900px;
      padding: 40px;
      position: relative;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.9), 0 0 40px rgba(155, 48, 255, 0.15);
      animation: detailIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      margin: auto;
    }

    .detail-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: none;
      color: var(--muted);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      transition: all 0.2s;
    }

    .detail-close:hover {
      background: rgba(255, 96, 96, 0.2);
      color: #fff;
    }

    /* Analysis View Parity */
    .analysis-title-block {
      text-align: center;
      margin-bottom: 32px;
    }

    .analysis-main-title {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      color: #e8e0ff;
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .analysis-meta-line {
      font-family: 'EB Garamond', serif;
      color: var(--gold);
      font-size: 0.95rem;
      margin-bottom: 20px;
    }

    .analysis-question-hero {
      font-family: 'Philosopher', serif;
      font-size: 1.15rem;
      font-style: italic;
      color: #e8e0ff;
      padding: 16px;
      background: rgba(155, 48, 255, 0.08);
      border: 1px solid rgba(155, 48, 255, 0.2);
      border-radius: 8px;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .ai-analysis-box {
      background: rgba(12, 0, 30, 0.4);
      border: 1px solid rgba(155, 48, 255, 0.25);
      border-radius: 12px;
      padding: 32px;
      margin-top: 32px;
    }

    .ai-label {
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      text-align: center;
      display: block;
      margin-bottom: 24px;
    }

    .ai-h3 {
      color: var(--gold);
      font-size: 1.15rem;
      font-family: 'Cinzel', serif;
      margin: 28px 0 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .ai-p {
      font-family: 'EB Garamond', serif;
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 16px;
      text-align: justify;
      color: rgba(232, 224, 255, 0.9);
    }

    .ai-list {
      padding-left: 20px;
      margin-bottom: 16px;
    }

    .ai-list li {
      font-family: 'EB Garamond', serif;
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 8px;
      color: rgba(232, 224, 255, 0.9);
    }

    .ai-divider {
      text-align: center;
      color: var(--gold);
      opacity: 0.5;
      margin: 32px 0;
      font-size: 1.2rem;
    }

    .cards-row {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      padding: 12px 0;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card-thumb {
      text-align: center;
      width: 110px;
    }

    .card-thumb-pos {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 8px;
      font-family: 'EB Garamond', serif;
    }

    .ab-card-img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid rgba(155, 48, 255, 0.4);
      box-shadow: 0 4px 16px rgba(107, 0, 204, 0.4);
    }

    .ab-card-img--rev {
      transform: rotate(180deg);
    }

    .card-thumb-name {
      font-size: 0.8rem;
      color: var(--gold-pale);
      margin-top: 10px;
      font-family: 'Philosopher', serif;
    }

    .detail-box {
      background: linear-gradient(160deg, rgba(16, 0, 40, 0.97), rgba(8, 0, 20, 0.99));
      border: 1px solid rgba(155, 48, 255, 0.3);
      border-radius: 20px;
      width: min(820px, 100%);
      padding: 36px;
      position: relative;
      box-shadow: 0 0 80px rgba(107, 0, 204, 0.35), 0 40px 100px rgba(0, 0, 0, 0.8);
      animation: detailIn 0.4s var(--ease-out) both;
    }

    .detail-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.4), transparent);
    }

    .detail-close {
      position: absolute;
      top: 18px;
      right: 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--muted);
      width: 33px;
      height: 33px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .detail-close:hover {
      background: rgba(255, 96, 96, 0.2);
      color: var(--danger);
      border-color: rgba(255, 96, 96, 0.4);
    }

    .detail-name {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 1.15rem;
      margin-bottom: 5px;
      text-shadow: 0 0 16px rgba(201, 168, 76, 0.3);
    }

    .detail-meta {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 22px;
      font-family: 'EB Garamond', serif;
    }

    .detail-question {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--text);
      padding: 13px 18px;
      background: rgba(155, 48, 255, 0.07);
      border-radius: 12px;
      margin-bottom: 22px;
      border-left: 3px solid rgba(155, 48, 255, 0.5);
    }

    .cards-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 22px;
    }

    .card-thumb {
      text-align: center;
      background: rgba(155, 48, 255, 0.06);
      border: 1px solid rgba(155, 48, 255, 0.18);
      border-radius: 10px;
      padding: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card-thumb:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(155, 48, 255, 0.3);
    }

    .card-thumb img {
      width: 62px;
      height: auto;
      border-radius: 5px;
      display: block;
      margin: 0 auto 5px;
    }

    .card-thumb.rev img {
      transform: rotate(180deg);
    }

    .card-thumb-name {
      font-size: 0.68rem;
      color: var(--muted);
      max-width: 74px;
    }

    .card-thumb-pos {
      font-size: 0.62rem;
      color: var(--gold);
      margin-bottom: 3px;
      letter-spacing: 0.05em;
    }

    .analysis-box {
      background: rgba(155, 48, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      max-height: 420px;
      overflow-y: auto;
    }

    .analysis-box::-webkit-scrollbar {
      width: 5px;
    }

    .analysis-box::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.03);
    }

    .analysis-box::-webkit-scrollbar-thumb {
      background: rgba(155, 48, 255, 0.4);
      border-radius: 3px;
    }

    .analysis-box pre {
      font-family: 'EB Garamond', serif;
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
    }

    .analysis-section-label {
      font-family: 'Philosopher', serif;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .analysis-section-label::before,
    .analysis-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201, 168, 76, 0.3), transparent);
    }

    /* ── Scrollbar ──────────────── */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(155, 48, 255, 0.35);
      border-radius: 3px;
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .search-input {
        width: 160px;
      }

      .content {
        padding: 16px;
      }

      .detail-box {
        padding: 22px;
      }
    }

    /* Loading skeleton */
    .skeleton-line {
      height: 14px;
      background: linear-gradient(90deg, rgba(155, 48, 255, 0.06) 25%, rgba(155, 48, 255, 0.12) 50%, rgba(155, 48, 255, 0.06) 75%);
      background-size: 200% 100%;
      border-radius: 7px;
      animation: skeletonShimmer 1.6s infinite;
    }

    @keyframes skeletonShimmer {
      from {
        background-position: 200% 0;
      }

      to {
        background-position: -200% 0;
      }
    }

    /* ══════════════════════════════════════════
       MOBILE RESPONSIVE — breakpoint 768px
    ══════════════════════════════════════════ */

    /* Hamburger button — hidden on desktop */
    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: var(--text);
      flex-direction: column;
      gap: 5px;
      flex-shrink: 0;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--gold);
      border-radius: 2px;
      transition: all 0.3s;
    }

    /* Sidebar overlay backdrop */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 19;
      transition: opacity 0.3s;
    }
    .sidebar-overlay.open { display: block; }

    /* Sidebar close button (mobile only) */
    .sidebar-close {
      display: none;
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(255,255,255,0.06);
      border: none;
      color: var(--muted);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      transition: all 0.2s;
    }
    .sidebar-close:hover { color: #fff; background: rgba(255,96,96,0.2); }

    @media (max-width: 768px) {
      /* Layout */
      .admin-layout { flex-direction: column; }

      /* Sidebar: hidden off-screen by default */
      .sidebar {
        position: fixed !important;
        left: 0; top: 0; bottom: 0;
        width: 280px;
        transform: translateX(-100%);
        transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.35s;
        z-index: 200;
        height: 100dvh;
        visibility: hidden;
      }
      .sidebar.open { transform: translateX(0); visibility: visible; }
      .sidebar-overlay { z-index: 199; }
      .sidebar-close { display: flex; align-items: center; justify-content: center; }

      /* Topbar */
      .topbar {
        padding: 12px 16px;
        flex-wrap: wrap;
        gap: 10px;
        position: sticky;
        top: 0;
        z-index: 15;
      }
      .hamburger { display: flex; }
      .topbar-title { font-size: 0.9rem; }
      .search-input {
        width: 100%;
        order: 3;
        box-sizing: border-box;
      }

      /* Content */
      .content { padding: 16px 12px; }

      /* Stats grid: 1 col on very small, 2 col on tablet */
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      .stat-value { font-size: 1.7rem; }

      /* Tables: horizontal scroll */
      .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      table { min-width: 640px; }
      .td-wrap { max-width: 160px; }

      /* Table header filters */
      .table-header {
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px 14px;
      }

      /* Filter btn / dropdowns */
      .filter-btn {
        min-width: unset;
        padding: 8px 12px;
        font-size: 0.82rem;
      }

      /* Detail modal */
      .detail-overlay { padding: 0; align-items: flex-end; }
      .detail-box {
        border-radius: 20px 20px 0 0;
        padding: 24px 16px 32px;
        max-height: 90dvh;
        overflow-y: auto;
        width: 100%;
        max-width: 100%;
      }
      .detail-close { top: 14px; right: 14px; }

      /* Theme bars label narrower */
      .theme-bar-label { width: 120px; font-size: 0.75rem; }

      /* Pagination */
      .pagination { justify-content: center; flex-wrap: wrap; gap: 4px; }
    }

    @media (max-width: 420px) {
      .stats-grid { grid-template-columns: 1fr; }
      .stat-card { padding: 16px; }
      .search-input { font-size: 0.82rem; padding: 8px 12px; }
    }

  </style>
</head>

<body>

  <!-- Canvas layers -->
  <canvas id="particleCanvas"></canvas>
  <canvas id="lightningCanvas"></canvas>

  <!-- Floating cards layer -->
  <div id="floatingCards" class="floating-cards-layer"></div>

  <!-- Background -->
  <div class="bg-nebula"></div>
  <div class="bg-vignette"></div>
  <div class="bg-sigil-wrap" aria-hidden="true">
    <svg class="bg-sigil-svg" viewBox="0 0 400 400">
      <circle cx="200" cy="200" r="188" fill="none" stroke="rgba(155,48,255,0.07)" stroke-width="1.2" />
      <circle cx="200" cy="200" r="150" fill="none" stroke="rgba(201,168,76,0.06)" stroke-width="0.9" />
      <circle cx="200" cy="200" r="112" fill="none" stroke="rgba(155,48,255,0.08)" stroke-width="0.8" />
      <circle cx="200" cy="200" r="70" fill="none" stroke="rgba(201,168,76,0.05)" stroke-width="0.6" />
      <polygon points="200,40 238,150 350,150 260,210 295,320 200,255 105,320 140,210 50,150 162,150" fill="none"
        stroke="rgba(201,168,76,0.03)" stroke-width="0.8" />
    </svg>
  </div>

  <!-- Login -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="sigil-wrap">
        <svg class="sigil-svg" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(155,48,255,0.4)" stroke-width="0.8" />
          <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="0.6" />
          <circle cx="100" cy="100" r="50" fill="none" stroke="rgba(155,48,255,0.6)" stroke-width="0.8" />
          <polygon points="100,20 118,80 180,80 130,115 150,175 100,140 50,175 70,115 20,80 82,80" fill="none"
            stroke="rgba(201,168,76,0.25)" stroke-width="0.6" />
          <circle cx="100" cy="100" r="6" fill="rgba(155,48,255,0.8)" />
        </svg>
        <div class="sigil-glow"></div>
      </div>
      <h1 class="login-title">Tarot Admin</h1>
      <p class="login-sub">Nhập mật khẩu để tiến vào cổng huyền bí</p>
      <input type="password" class="login-input" id="secretInput" placeholder="✦  Mật khẩu bí mật..." />
      <button class="login-btn" onclick="doLogin()">✦ Tiến Vào ✦</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- App -->
  <div id="app">
    <div class="admin-layout">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <button class="sidebar-close" onclick="closeSidebar()" aria-label="Đóng menu">✕</button>
        <div class="sidebar-logo">
          <span class="sidebar-logo-icon">🔮</span>
          <div class="sidebar-logo-title">Tarot Admin</div>
          <div class="sidebar-logo-sub">Bảng Điều Khiển Huyền Bí</div>
        </div>
        <nav>
          <div class="nav-item active" data-view="dashboard" onclick="switchView('dashboard', this); closeSidebar()">
            <span class="nav-icon">✦</span> Tổng Quan
          </div>
          <div class="nav-item" data-view="readings" onclick="switchView('readings', this); closeSidebar()">
            <span class="nav-icon">🃏</span> Lịch Sử Trải Bài
          </div>
          <div class="nav-item" data-view="users" onclick="switchView('users', this); closeSidebar()">
            <span class="nav-icon">👥</span> Người Dùng
          </div>
        </nav>
        <div class="sidebar-footer">
          <button class="logout-btn" onclick="logout()">↩ Đăng Xuất</button>
        </div>
      </aside>

      <!-- Main -->
      <div class="main">

  <script>
    (function () {
      const canvas = document.getElementById('adminCanvas') ||
                     document.getElementById('particleCanvas');
      if (!canvas) return; // safeguard
      const ctx = canvas.getContext('2d');
      let stars = [], W, H;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function initStars(n) {
        stars = [];
        for (let i = 0; i < n; i++) {
          stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.2 + 0.2,
            speed: Math.random() * 0.2 + 0.05,
            alpha: Math.random(),
            da: (Math.random() * 0.005 + 0.002) * (Math.random() < 0.5 ? 1 : -1)
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        // Soft radial glow in center
        const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.6);
        grad.addColorStop(0, 'rgba(107,0,204,0.06)');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        stars.forEach(s => {
          s.alpha += s.da;
          if (s.alpha >= 1 || s.alpha <= 0) s.da *= -1;
          s.y += s.speed;
          if (s.y > H) { s.y = 0; s.x = Math.random() * W; }

          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200,180,255,${Math.max(0, Math.min(1, s.alpha))})`;
          ctx.fill();
        });

        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); initStars(180); });
      resize();
      initStars(180);
      draw();
    })();
  </script>

    function markdownToHtml(md) {
      if (!md) return '(Chưa có luận giải)';
      return md
        .replace(/^[-*_]{3,}$/gm, '<div class="analysis-section-label" style="margin:20px 0">✦</div>')
        .replace(/^### (.+)$/gm, '<h3 style="color:var(--gold); font-family:Cinzel,serif; font-size:1.1rem; margin:20px 0 10px;">$1</h3>')
        .replace(/^## (.+)$/gm, '<h2 style="color:var(--gold-pale); font-family:Cinzel,serif; font-size:1.2rem; margin:24px 0 12px; border-bottom:1px solid var(--border); padding-bottom:8px;">$1</h2>')
        .replace(/^# (.+)$/gm, '<h2 style="color:var(--gold-pale); font-family:Cinzel,serif; font-size:1.4rem; margin:28px 0 16px;">$1</h2>')
        .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--gold-pale)">$1</strong>')
        .replace(/\*(.+?)\*/g, '<em style="color:var(--muted)">$1</em>')
        .replace(/^[-•] (.+)$/gm, '<li style="margin-left:20px; margin-bottom:8px;">$1</li>')
        .replace(/(<li style=.*<\/li>\n?)+/gs, m => `<ul style="list-style-type:square; margin:10px 0; color:var(--text);">${m}</ul>`)
        .replace(/^\d+\. (.+)$/gm, '<li style="margin-left:20px; margin-bottom:8px;">$1</li>')
        .replace(/\n\n+/g, '</p><p style="margin-bottom:16px;">')
        .replace(/^(?!<[hul])(.+)$/gm, (m) => m.trim() ? m : '')
        .replace(/^([^<].+)$/gm, '<p style="margin-bottom:16px;">$1</p>');
    }

      const filterHTML = `

    // ── User Management Actions ──────────────────────────
    async function updateUserPlan(id, newPlan, currentStatus) {
      try {
        const res = await fetch(API + '?action=update_user', {
          method: 'POST',
          headers: { 'Authorization': `Bearer \${SECRET}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, plan_type: newPlan, status: currentStatus })
        });
        if (!res.ok) throw new Error();
      } catch (e) {
        alert("Lỗi khi cập nhật gói cước.");
        renderUsers(document.getElementById('searchInput').value);
      }
    }

    async function toggleStatus(id, currentStatus, newStatus, currentPlan) {
      if (currentStatus === newStatus) return;
      try {
        const res = await fetch(API + '?action=update_user', {
          method: 'POST',
          headers: { 'Authorization': `Bearer \${SECRET}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, plan_type: currentPlan, status: newStatus })
        });
        if (!res.ok) throw new Error();
        renderUsers(document.getElementById('searchInput').value);
      } catch (e) {
        alert("Lỗi khi cập nhật trạng thái.");
      }
    }

    async function executeDeleteUser(id) {
      try {
        const res = await fetch(API + '?action=delete_user', {
          method: 'POST',
          headers: { 'Authorization': `Bearer \${SECRET}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });
        if (!res.ok) throw new Error();
        renderUsers(document.getElementById('searchInput').value);
      } catch (e) {
        alert("Lỗi khi xóa người dùng.");
      }
    }

    /* ── Lightweight Markdown → HTML ─────────────────────── */
    function markdownToHtml(md) {
      if (!md) return '';
      return md
        .replace(/^[-*_]{3,}$/gm, '<div class="ai-divider"><span>✦</span></div>')
        .replace(/^### (.+)$/gm, '<h3 class="ai-h3">$1</h3>')
        .replace(/^## (.+)$/gm, '<h3 class="ai-h3">$1</h3>')
        .replace(/^# (.+)$/gm, '<h3 class="ai-h3">$1</h3>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/gs, m => `<ul class="ai-list">${m}</ul>`)
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        .replace(/\n\n+/g, '</p><p class="ai-p">')
        .replace(/^(?!<[hul])(.+)$/gm, (m) => m.trim() ? m : '')
        .replace(/^([^<].+)$/gm, '<p class="ai-p">$1</p>');
    }

    // ── Detail modal ─────────────────────────────────────

      document.getElementById('detailOverlay').classList.add('open');
      document.getElementById('detailContent').innerHTML = '<div style="color:var(--muted); padding:40px; text-align:center; font-family:\'EB Garamond\',serif; font-style:italic; font-size:1rem;">Đang kết nối vũ trụ...</div>';
      const d = await apiFetch('reading', { id });
      const r = d.reading;

      const formattedDate = r.created_at.slice(0, 16).replace('T', ' ');
      const dobText = r.dob ? `${r.dob} — ` : '';

      document.getElementById('detailContent').innerHTML = `
    <div class="analysis-title-block">

      <p class="analysis-meta-line">${r.name} ✧ ${dobText}${THEME_MAP[r.theme] || r.theme}</p>

    <div class="cards-row">
      ${(r.cards || []).map(c => {
        const deckCard = window.TAROT_DB ? window.TAROT_DB.find(dbC => dbC.name === c.card_name) : null;
        const imgSrc = deckCard ? `../${deckCard.image}` : `../cards/${(c.card_name || '').toLowerCase().replace(/ /g, '-')}.jpg`;
        return `
        <div class="card-thumb">
          <div class="card-thumb-pos">${c.position_label || ''}</div>
          <img class="ab-card-img ${c.is_reversed ? 'ab-card-img--rev' : ''}" 
               src="${imgSrc}" 
               onerror="this.src='../cards/back.png'" alt="${c.card_name}" />
          <div class="card-thumb-name">${c.card_name_vi || c.card_name}${c.is_reversed ? ' ↓' : ''}</div>
        </div>
        `;
      }).join('')}
    </div>

    <div class="ai-analysis-box">
      <span class="ai-label">✦ Luận Giải Cuối Cùng</span>
      ${markdownToHtml(r.gemini_analysis)}
    </div>
  `;
    }

    function closeDetail() {
      document.getElementById('detailOverlay').classList.remove('open');
    }
    document.getElementById('detailOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('detailOverlay')) closeDetail();
    });

    // ── Pagination ────────────────────────────────────────
    function renderPagination(current, total) {
      if (total <= 1) return '';
      let html = '';
      html += `<button class="page-btn" onclick="goPage(${current - 1})" ${current <= 1 ? 'disabled' : ''}>‹</button>`;
      for (let i = 1; i <= total; i++) {
        if (i === 1 || i === total || Math.abs(i - current) <= 2) {
          html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
        } else if (Math.abs(i - current) === 3) {
          html += `<span class="page-btn" style="pointer-events:none">…</span>`;
        }
      }
      html += `<button class="page-btn" onclick="goPage(${current + 1})" ${current >= total ? 'disabled' : ''}>›</button>`;
      return html;
    }

    function goPage(p) {
      currentPage = p;
      loadView(currentView);
    }

    // ── Action Dropdown & Confirm Modals ────────────────
    let activeDropdown = null;
    let activeFilterMenu = null;
    let pendingActionCallback = null;

    function toggleDropdown(event, userId) {
      event.stopPropagation();
      const dropdown = document.getElementById(`dropdown-${userId}`);
      if (activeDropdown && activeDropdown !== dropdown) {
        activeDropdown.classList.remove('show');
      }
      dropdown.classList.toggle('show');
      activeDropdown = dropdown.classList.contains('show') ? dropdown : null;
    }

    function toggleFilterMenu(event, menuId) {
      event.stopPropagation();
      const menu = document.getElementById(menuId);
      if (activeFilterMenu && activeFilterMenu !== menu) {
        activeFilterMenu.classList.remove('show');
      }
      menu.classList.toggle('show');
      activeFilterMenu = menu.classList.contains('show') ? menu : null;
    }

    function selectTheme(val) {
      filterTheme = val;
      if (activeFilterMenu) activeFilterMenu.classList.remove('show');
      currentPage = 1;
      renderReadings(document.getElementById('searchInput').value);
    }

    function selectDatePreset(preset) {
      const today = new Date();
      const todayStr = today.toISOString().split('T')[0];

      if (preset === 'today') {
        filterStart = todayStr; filterEnd = todayStr;
      } else if (preset === 'yesterday') {
        const yest = new Date(today.getTime() - 86400000).toISOString().split('T')[0];
        filterStart = yest; filterEnd = yest;
      } else if (preset === '7days') {
        filterStart = new Date(today.getTime() - 7 * 86400000).toISOString().split('T')[0];
        filterEnd = todayStr;
      } else if (preset === '30days') {
        filterStart = new Date(today.getTime() - 30 * 86400000).toISOString().split('T')[0];
        filterEnd = todayStr;
      } else if (preset === 'all') {
        filterStart = ''; filterEnd = '';
      }

      if (activeFilterMenu) activeFilterMenu.classList.remove('show');
      currentPage = 1;
      renderReadings(document.getElementById('searchInput').value);
    }

    function updateCustomDate() {
      currentPage = 1;
      renderReadings(document.getElementById('searchInput').value);
    }

    document.addEventListener('click', () => {
      if (activeDropdown) {
        activeDropdown.classList.remove('show');
        activeDropdown = null;
      }
      if (activeFilterMenu) {
        activeFilterMenu.classList.remove('show');
        activeFilterMenu = null;
      }
    });

    function confirmAction(title, desc, confirmBtnText, btnClass, callback) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalDesc').textContent = desc;
      const btn = document.getElementById('modalConfirmBtn');
      btn.textContent = confirmBtnText;
      btn.className = `btn-modal ${btnClass}`;
      pendingActionCallback = callback;
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      pendingActionCallback = null;
    }
    document.addEventListener('DOMContentLoaded', function() {
      const btn = document.getElementById('modalConfirmBtn');
      if (btn) btn.addEventListener('click', () => {
        if (pendingActionCallback) pendingActionCallback();
        closeModal();
      });
    });

  </script>
